set default=0
set timeout=5

# Initialize High-Resolution Video Output
insmod all_video
insmod gfxterm
insmod png
insmod jpeg
insmod gfxmenu
insmod font

# Stabilize video resolution
set gfxmode=1024x768,auto
set gfxpayload=keep

# Terminal fallback configuration (Hardware diagnostics)
serial --unit=0 --speed=115200
terminal_output gfxterm serial
terminal_input console serial

# Load Sovereign Theme
loadfont /EFI/BOOT/unifont.pf2
set theme=/EFI/BOOT/theme.txt

menuentry "Magnolia Sovereign (Stage A)" {
    linux /EFI/BOOT/bzImage root=/dev/vda2 rw rootwait console=tty1 console=ttyS0 earlyprintk=ttyS0 nokaslr
}

menuentry "Magnolia Sovereign (Stage B)" {
    linux /EFI/BOOT/bzImage root=/dev/vda3 rw rootwait console=tty1 console=ttyS0 earlyprintk=ttyS0 nokaslr
}
