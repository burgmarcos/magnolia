image magnolia.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition boot {
		image = "efi-part.vfat"
		partition-type-uuid = "U"
		offset = 32K
		bootable = true
	}

	partition rootfs_a {
		image = "rootfs.ext4"
		partition-type-uuid = "L"
	}

	partition rootfs_b {
		image = "rootfs.ext4"
		partition-type-uuid = "L"
	}

	partition appdata {
		partition-type-uuid = "L"
		size = 1G
	}

	partition userdata {
		partition-type-uuid = "4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709"
		size = 2G
	}
}

image efi-part.vfat {
	vfat {
		file EFI/BOOT/BOOTX64.EFI {
			image = "grub-x86_64.efi"
		}
		file EFI/BOOT/grub.cfg {
			image = "grub.cfg"
		}
		file EFI/BOOT/bzImage {
			image = "bzImage"
		}
		file EFI/BOOT/theme.txt {
			image = "grub-theme/theme.txt"
		}
		file EFI/BOOT/unifont.pf2 {
			image = "grub-theme/unifont.pf2"
		}
		file EFI/BOOT/background.png {
			image = "grub-theme/background.png"
		}
	}
	size = 64M
}
