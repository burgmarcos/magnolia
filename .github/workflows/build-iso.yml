name: Magnolia ISO Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Magnolia Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Buildroot Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libssl-dev texinfo zip unzip \
          sed make binutils build-essential diffutils gcc g++ bash patch gzip bzip2 perl \
          tar cpio python3 python3-pip rsync bc bison flex qemu-utils genimage

      - name: Setup Buildroot
        run: |
          git clone --depth 1 https://github.com/buildroot/buildroot.git ../buildroot
          
      - name: Configure Magnolia x86_64
        run: |
          cd ../buildroot
          make BR2_EXTERNAL=$GITHUB_WORKSPACE/magnolia-distro magnolia_x86_64_defconfig

      - name: Build Magnolia ISO (Multi-threaded)
        run: |
          cd ../buildroot
          make BR2_EXTERNAL=$GITHUB_WORKSPACE/magnolia-distro -j$(nproc)

      - name: Upload Magnolia ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magnolia-x86_64-Rolling
          path: ../buildroot/output/images/rootfs.iso
