name: Magnolia ISO Build

on:
  # Disabled auto-trigger until local build is verified
  # push:
  #   branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Magnolia Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Buildroot Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libssl-dev texinfo zip unzip \
          sed make binutils diffutils gcc g++ bash patch gzip bzip2 perl \
          tar cpio python3 python3-pip rsync bc bison flex qemu-utils genimage \
          libelf-dev libdw-dev

      - name: Cache Buildroot output
        uses: actions/cache@v4
        with:
          path: |
            ../buildroot-dl
            ../buildroot/dl
            ../buildroot/output/host
            ../buildroot/output/build
            ~/.buildroot-ccache
          key: buildroot-${{ hashFiles('magnolia-distro/configs/magnolia_x86_64_defconfig', 'magnolia-distro/package/**', 'magnolia-core/Cargo.lock', 'magnolia-supervisor/Cargo.lock') }}
          restore-keys: buildroot-

      - name: Setup Buildroot
        run: |
          git clone --depth 1 https://github.com/buildroot/buildroot.git ../buildroot

      - name: Configure Magnolia x86_64
        run: |
          cd ../buildroot
          make BR2_EXTERNAL=$GITHUB_WORKSPACE/magnolia-distro magnolia_x86_64_defconfig

      - name: Pre-fetch Cargo dependencies
        run: |
          # Populate the Buildroot cargo offline cache before the build.
          # Buildroot sets CARGO_HOME=$(BR2_DL_DIR)/br-cargo-home. The default
          # BR2_DL_DIR is $(TOPDIR)/dl = ../buildroot/dl (relative to GITHUB_WORKSPACE).
          CARGO_HOME_BR="$GITHUB_WORKSPACE/../buildroot/dl/br-cargo-home"
          mkdir -p "$CARGO_HOME_BR"
          CARGO_HOME="$CARGO_HOME_BR" cargo fetch \
            --manifest-path magnolia-core/Cargo.toml --locked
          if [ -f magnolia-supervisor/Cargo.lock ]; then
            CARGO_HOME="$CARGO_HOME_BR" cargo fetch \
              --manifest-path magnolia-supervisor/Cargo.toml --locked
          fi

      - name: Build Magnolia ISO (Multi-threaded)
        run: |
          cd ../buildroot
          make BR2_EXTERNAL=$GITHUB_WORKSPACE/magnolia-distro \
            BR2_DL_DIR=$GITHUB_WORKSPACE/../buildroot-dl \
            BR2_CCACHE=y BR2_CCACHE_DIR=$HOME/.buildroot-ccache \
            -j$(nproc)

      - name: Upload Magnolia ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magnolia-x86_64-Rolling
          path: ../buildroot/output/images/magnolia.img
