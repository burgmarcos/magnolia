name: Magnolia Sovereign Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-ui:
    name: Verify Magnolia Interface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Lint
        working-directory: magnolia-interface
        run: |
          npm install
          npm run lint
      - name: Build Assets
        working-directory: magnolia-interface
        run: npm run build

  verify-core:
    name: Verify Magnolia Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libjavascriptcoregtk-4.1-dev libsecret-1-dev
      - name: Check & Test
        working-directory: magnolia-core
        run: |
          cargo check --target x86_64-unknown-linux-gnu
          cargo test --target x86_64-unknown-linux-gnu

  verify-supervisor:
    name: Verify Magnolia Supervisor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Build Static binary
        working-directory: magnolia-supervisor
        run: cargo build --release --target x86_64-unknown-linux-musl
