<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.4">
    <path d="M1920 0H0V1080H1920V0Z" fill="url(#paint0_radial)"/>
    <path d="M1920 0H0V1080H1920V0Z" fill="url(#paint1_linear)"/>
    <circle cx="1600" cy="200" r="400" fill="url(#paint2_radial)" opacity="0.6">
      <animate attributeName="r" values="380;420;380" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="800" r="500" fill="url(#paint3_radial)" opacity="0.5">
      <animate attributeName="r" values="480;520;480" dur="15s" repeatCount="indefinite" />
    </circle>
    <path d="M0 1080C400 900 600 1100 1920 700V1080H0Z" fill="var(--magnolia-primary, #8E44AD)" opacity="0.2">
      <animate attributeName="d" 
        values="M0 1080C400 900 600 1100 1920 700V1080H0Z;M0 1080C500 1000 700 950 1920 800V1080H0Z;M0 1080C400 900 600 1100 1920 700V1080H0Z" 
        dur="20s" repeatCount="indefinite" />
    </path>
  </g>
  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 540) rotate(90) scale(540 960)">
      <stop stop-color="var(--magnolia-surface, #1A1128)"/>
      <stop offset="1" stop-color="var(--magnolia-background, #050505)"/>
    </radialGradient>
    <linearGradient id="paint1_linear" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--magnolia-primary, #8E44AD)" stop-opacity="0.1"/>
      <stop offset="1" stop-color="var(--magnolia-secondary, #3498DB)" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="paint2_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1600 200) rotate(90) scale(400)">
      <stop stop-color="var(--magnolia-primary, #8E44AD)" stop-opacity="0.3"/>
      <stop offset="1" stop-color="var(--magnolia-primary, #8E44AD)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="paint3_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 800) rotate(90) scale(500)">
      <stop stop-color="var(--magnolia-secondary, #3498DB)" stop-opacity="0.2"/>
      <stop offset="1" stop-color="var(--magnolia-secondary, #3498DB)" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
